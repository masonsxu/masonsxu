name: Render Banner

on:
  push:
    paths:
      - "banner/src/**"
      - "banner/package.json"
      - ".github/workflows/banner.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: banner
        run: npm ci

      - name: Render GIF
        working-directory: banner
        run: npx remotion render src/index.ts Banner --output ../assets/banner.gif --codec gif --every-nth-frame 2

      - name: Commit banner
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/banner.gif
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "更新 Profile 动画横幅"
            git push
          fi
